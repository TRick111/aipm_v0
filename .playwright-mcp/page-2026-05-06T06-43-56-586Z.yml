          - generic [ref=e31]: ABOUT
          - heading "Core Drivenについて" [level=1] [ref=e32]
          - paragraph [ref=e33]: Core Drivenは、経営者の熱意を構想に変え、構想を事業として実現へ導く事業共創パートナーです。 経営者の頭の中にある想い、違和感、構想を整理し、 事業として成立する形に落とし込み、 必要に応じてマーケティング、営業、現場運営、AI業務OS化まで伴走します。 構想を語るだけで終わらせず、 実現に向けて共に考え、共に動き、 継続的に価値が生まれる仕組みへ変えていきます。
        - generic [ref=e35]:
          - generic [ref=e36]:
            - generic [ref=e37]: MISSION / VISION / VALUES
            - heading "私たちが大切にしていること" [level=2] [ref=e38]
          - generic [ref=e39]:
            - generic [ref=e40]: MISSION
            - generic [ref=e41]:
              - generic [ref=e42]: 熱意を構想に、 構想を事業に。
              - paragraph [ref=e43]: 経営者の内側には、まだ言葉になっていない熱意、違和感、本音、構想がある。 Core Drivenは、その熱意に向き合い、実現可能な構想へ整理する。 そして、その構想を理想論で終わらせず、 事業、収益、体制、現場、仕組みへ落とし込み、実現へ導く。 熱意を構想に変え、構想を事業に変える。 それがCore Drivenの使命です。
          - generic [ref=e44]:
            - generic [ref=e45]: VISION
            - generic [ref=e46]:
              - generic [ref=e47]: ビジネスを心から 楽しめる社会へ。
              - paragraph [ref=e48]: ビジネスは、本来もっと面白いものである。 本心から生まれた構想があり、 信じたい可能性があり、 実現したい未来がある。 しかし多くの経営者は、日々の意思決定、現場の課題、属人的な業務、情報の散在に追われ、 本来向き合うべき構想や価値創造に集中しきれていない。 Core Drivenは、経営者の側に立ち、 人とAIの力で、構想を整理し、事業化し、継続的に回る仕組みへ変えていく。 本心から生まれた挑戦が、価値を生み、 経営者も、チームも、ビジネスそのものを心から楽しめる社会を目指します。
          - generic [ref=e49]:
            - generic [ref=e50]: VALUES
            - generic [ref=e51]:
              - generic [ref=e52]:
                - generic [ref=e53]: VALUE 01
                - heading "Face the Core" [level=3] [ref=e54]
                - generic [ref=e55]: 核心に向き合う
                - paragraph [ref=e56]: 表面的な要望や、言いやすい課題だけを扱わない。 経営者の本音、違和感、熱意、恐れ、可能性まで見にいき、 本当に向き合うべきCoreを捉える。 耳ざわりの良い答えではなく、 事業の出発点となる本質に向き合う。
              - generic [ref=e57]:
                - generic [ref=e58]: VALUE 02
                - heading "Lead with Intelligence" [level=3] [ref=e59]
                - generic [ref=e60]: 知性と戦略で導く
                - paragraph [ref=e61]: 熱意や感覚だけで、事業は実現しない。 市場、顧客、収益、体制、優先順位を冷静に見極め、 構想が実現するための勝ち筋を描く。 勢いや思いつきに頼らず、 知性と戦略によって、経営者の構想を実現へ導く。
              - generic [ref=e62]:
                - generic [ref=e63]: VALUE 03
                - heading "Enjoy Creating" [level=3] [ref=e64]
                - generic [ref=e65]: 価値創造を楽しむ
                - paragraph [ref=e66]: 難しい構想、複雑な現場、不確実な挑戦を、 重荷としてではなく、面白さとして捉える。 本質に向き合い、知性と戦略で考え抜いた先にある、 事業づくりの楽しさを大切にする。 経営者がビジネスを心から楽しめるように、 私たち自身が価値創造を楽しむ。
