            - text: 経営者の構想を実現へ導く。
          - paragraph [ref=e52]: Biz Coreは、経営者・事業責任者の熱意や構想を起点に、 事業設計、収支計画、マーケティング、営業導線、現場運用までを一気通貫で支援するサービスです。 外から助言するだけではなく、事業の内側に入り、 経営者の側に立ちながら、実現まで共に動きます。
