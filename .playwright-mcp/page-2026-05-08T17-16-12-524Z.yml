        - heading "Biz Core" [level=1] [ref=e49]
        - generic [ref=e50]:
          - text: 人が入り、
          - text: 経営者の構想を実現へ導く。
        - paragraph [ref=e51]: Biz Coreは、経営者・事業責任者の熱意や構想を起点に、 事業設計、収支計画、マーケティング、営業導線、現場運用までを一気通貫で支援するサービスです。 外から助言するだけではなく、事業の内側に入り、 経営者の側に立ちながら、実現まで共に動きます。
        - link "相談する →" [ref=e53] [cursor=pointer]:
          - /url: /contact-new/
      - generic [ref=e56]:
        - generic [ref=e57]:
          - generic [ref=e58]:
            - generic [ref=e59]: CHALLENGES
            - heading "構想はある。 しかし、実現まで進まない。" [level=2] [ref=e60]:
              - text: 構想はある。
              - text: しかし、実現まで進まない。
          - paragraph [ref=e61]: 経営者には、実現したい構想や熱意がある。 しかし、構想がまだ言語化されていない。優先順位が決まらない。事業計画や収支計画に落ちない。推進役がいない。現場に伝わらない。 そうした課題に対して、Core Drivenは外から助言するだけではなく、事業の内側に入り、整理、設計、推進、実装を担います。
