            - text: また、単に影響力が高いだけでなく、あなたの飲食店と相性の良いインフルエンサーをマッチングするため、短期間で高い効果が期待できます。
            - text: キャスティングをするだけでなく、撮影前にインフルエンサーと企画を相談いたします。これにより、あなたの飲食店の魅力が存分に表現できる動画が制作できるため、飲食店の認知度が一気に高まり、インフルエンサーの評価も高まります。双方にとって良い結果を得られる企画にすることで、キャスティングによるPRの効果をさらに高めます。
