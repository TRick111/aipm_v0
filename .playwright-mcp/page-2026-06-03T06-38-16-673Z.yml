    - heading "9. 運用 FAQ" [level=2] [ref=e461]
    - heading "Q. 同じ時間帯に手動で 2 件目を入れたい" [level=4] [ref=e462]
    - paragraph [ref=e463]:
      - text: A. Google Calendar に直接イベントを追加すれば、システム経由の予約はその時間を避ける。
      - strong [ref=e464]: ただし「準備時間 (前)」「準備時間 (後)」までは自動でブロックされないので、施術 30 分前後の余裕を手動で確保する必要あり
      - text: 。
    - heading "Q. 1 日 1 件だけ特別枠 (VIP 等) を作りたい" [level=4] [ref=e465]
    - paragraph [ref=e466]: A. 該当時間帯を Google Calendar で「VIP 枠」イベントとしてブロックしておく → 当日にお客様を別途案内。
    - heading "Q. 営業時間外の問い合わせをどう捌くか" [level=4] [ref=e467]
    - paragraph [ref=e468]:
      - text: A. お客様の問い合わせは LINE 相談ボタン (
      - code [ref=e469]: https://lin.ee/y4yB6lD
      - text: ) に集約されている。営業時間内にまとめて返信。
    - heading "Q. お客様から「コースの所要時間が思っていたより短い」と言われた" [level=4] [ref=e470]
    - paragraph [ref=e471]:
      - text: A. 管理画面 → コース編集 → 「所要時間 (分)」を変更。
      - strong [ref=e472]: ただし変更後の所要時間は新規予約から適用
      - text: 。既存予約の時間枠は Calendar 上で別途調整が必要。
    - heading "Q. 予約画面のテスト方法" [level=4] [ref=e473]
    - paragraph [ref=e474]: A. スタッフ自身のメールアドレスで実際に予約を入れて、メール / Calendar まで通しで確認する。テストが終わったら 5.4 の手順でキャンセル。
