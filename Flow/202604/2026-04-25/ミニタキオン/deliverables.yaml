        comment: >-
          朝の整理エージェントのプロンプトの中で、全ストックプロジェクトのステータスを読むとありますが、そうではなくて、バックログの中にあるプロジェクトだけを抽出して、そのプロジェクトのステータスを確認するという流れにしてください。デイリーとラップアップは専用のストックではなく、フローのその日の作業フォルダの中に入れておくのがいいかなと思ってますが、なんか不都合ありますかね。プロジェクトに分散というより、デイリーとラップアップはプロジェクトごとに分けずに、その日の内容がその日に紐づくのかなと思ってます。


          デイリーとラップアップで2つ朝夕で作りたいです。タスク誘導は一旦推奨のものでOKです。承認後の更新はAI側でやってほしいです。アーカイブが何を指しているのか分かりませんが、バックログのデイリーとラップアップの話なのであれば、フローにどんどん貯めておきたいです。


          確認するのは前日、または前日のがなければその前の日とかでいいかなと思ってます。今日を始めるは8時半までにやりたいです。朝のうちにやる前提でお願いします。スキップ機能は一旦なくて大丈夫です。スキップしたいときはデイリーを始めて、そのときにその日はスキップする旨伝えます。
