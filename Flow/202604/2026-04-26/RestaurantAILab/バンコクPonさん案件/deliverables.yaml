    review_log:
      - at: '2026-04-26T20:00:00.000Z'
        action: created
        to: unreviewed
        comment: |-
          BL-0068 (P1, Due 2026-04-26) の AI 調査ドラフト v1 を作成。
          5 候補 (① WISE 個人 / ② WISE Business / ③ Payoneer / ④ Revolut Business / ⑤ 銀行 SWIFT) を
          6 軸 (手数料 / 為替マークアップ / 着金スピード / タイ→日本対応 / 開設KYC所要 / 上限・コンプラ) で比較。
          コスト試算 (5,000 USD × 12 ヶ月) では WISE 系が年 4.5〜8 万円、Payoneer が 18〜45 万円、SWIFT が 18〜35 万円。
          Revolut Business は日本居住者の Business 受取が不可で実質除外。
          推奨: 第一 = WISE Business (法人 → 個人、開設 1〜2 週)、第二 = WISE 個人 (即運用可)、
          バックアップ = SWIFT (大口・緊急時のみ)。
          実装は Phase A (初回個人 WISE で即時運用開始) → Phase B (継続 Business 化) → Phase C (SWIFT バックアップ整備)。
          田中さん最終選定ポイント Q-A〜Q-F (送金者名義 / 初回タイミング / 月次想定額 / 受取口座 / PONさん側決裁者 / SWIFT 整備優先度) を末尾に明記。
          確認事項.md B1 に要約を流し込み予定。
    last_modified: '2026-04-26T20:00:00.000Z'
