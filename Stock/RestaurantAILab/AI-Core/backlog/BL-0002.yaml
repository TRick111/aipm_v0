      /Users/rikutanaka/RestaurantAILab/Markdowns-1/Stock/バンコクPonさん案件/AIOS提供/2._提供資料/講義資料

      これはポンさんへのAIOSを提供する講義資料の例です。この例を参考に、言いたけさん向けにAIOS（今回言いたけさん向けには「AIコア」と言っています）を導入するための資料を作ってください。やりたいのは、MCP接続をするところ、CLI接続をするところまでです。CLIはGoogleのCLIを接続したいです。


      1日午後を丸々使って一緒にセットアップをするので、ゴールをパートに分けて、そのパートごとにゴールを設定していきたいと思います。また、その日1日で達成することをどこまでやるかというのを最初に説明してください。


      飯竹さんは、さらに今、PONさんの内容に追加でCloud Codeを使う想定です。そのため、カーソルにCloud
      Codeのプラグインを追加して、実際に実行するところまでやりたいと思います。クロードの使いこなしの一歩目として、スキルやルールの設定があると思うので、その章も追加してください。逆に、モバイルでの利用は考えていないため、そこはPONさんの内容から抜いてもらって構わないです。まずは講義の構成案を作成してください。
