      Q-A. 送金者名義 [方針確定 / 任意]

      PONさん側は「Rio's Innovation 法人」送金にしたいか、「Pon さん個人」送金で会計を回せるか。Phase B（§3 PONさん側 Wise 開設）の手順分岐に直結。

      選択肢:
      - (a) Rio's Innovation 法人 → Wise Business（タイ法人）開設、書類7点・所要 1〜2 週
      - (b) Pon さん個人 → Wise 個人（タイ）開設、KYC 1〜3 日で即運用可
      - (c) 両方並行検討（初回 (b) 即時運用 → 後で (a) Business に切替）

      📌 AI推奨: (c)。初回（5月上旬支払い）に間に合わせるため (b) で運用開始 → 並行で (a) を進めて Business 化

