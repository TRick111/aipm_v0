      Q-C. 月次 25 万円固定 / 方式 (B) JPY 建て請求でよいか [方針確定]

      田中さん共有前提では「月25万円毎月発生」。本書では方式 (B) JPY 建て請求で田中さん手取りを 250,000 円固定にする方針（送金者側で為替変動を吸収）。

      選択肢:
      - (a) YES、25万円 JPY 固定で進める
      - (b) THB 建てで請求したい（Rio's Innovation 経費計上をバーツ建てにしたい等）→ 方式 (A)
      - (c) USD 建てで請求したい → 方式 (C)
      - (d) 金額そのものを変えたい（25万円から増減）

      📌 AI推奨: (a)。為替変動リスクが田中さんに来ない・会計シンプル

      参照: wise_billing_full_procedure_v1.md §0 通貨経路試算, §5 月次請求書発行
