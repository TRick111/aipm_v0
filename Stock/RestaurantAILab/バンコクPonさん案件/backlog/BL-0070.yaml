  - at: '2026-04-27T01:05:43.833Z'
    type: answer
    by: user
    content: |-
      AIサイネージ開発プロジェクト
      プロジェクトの概要と目的
      - 9月にタイのセントラルワールドで開催されるイベント（コスモプロフ）に向けて、AIサイネージの開発を検討。
      - 「業界初、美容展示会で会話するAI」としてメディア露出を狙う。
      技術要件とUX
      - 多言語対応: 主にタイ語と英語に対応。学習データが少ないタイ語の品質が課題となる可能性があるため、実機で動作確認を行う。
      - 対象商品: J-beautyの8社、合計100〜200 SKU（絹女、コーセーの雪肌精など）の情報をインプットし、その範囲内でのみ回答する。
      - UX向上: 全てを会話で完結させず、タッチ操作を組み合わせることでUX向上を図る。
      - 応答速度と品質: 会話シナリオやガードレール（会話ルール）を設計し、最初に「どの分野に興味がありますか？」といった質問で候補を絞り込むことで、応答速度と回答品質を担保する。

      アバターについては以下の3つの案を用意し、要件側に選択肢を提示してどれにするか決めてもらいたいです：

      1. 2次元のイケメンアバター
      2. 汎用のストックアバター
      3. スタッフを撮影してその人を使う

      それぞれのメリットを簡単に記載してほしいです。例えば、実装が簡単である、またはブランドイメージに合致するなど。

      商品マスターは一旦30件ほどでPOC（概念実証）を行います。KOSEIという会社のアイテムはすでに出揃っているため、それを使ってPOCを進めたいです。

      対応言語は日本語、英語、タイ語、中国語を対象とします。特にタイ語はマイナー言語であるため、タイ語対応が可能なことが最も厳しい要件です。タイ語に対応できれば、日英中の対応は問題ないと考えています。
