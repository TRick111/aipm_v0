    content: |-
      Q4. iCloud → Google Calendar の移行意向は？ [任意]

      Part 4 の説明を「並行運用押し」にするか「移行押し」にするかの判断材料。本人の予定管理スタイル次第。

      選択肢:
      - (a) 完全移行したい (家族予定含めて Google に集約) → 移行手順を厚めに説明
      - (b) 並行運用が良い (家族は iCloud / 仕事は Google) → 並行構成を厚めに説明 (田中の本命推奨)
      - (c) 当面 iCloud のみ、AI 連携は気が向いたら → Part 4 は概要紹介に絞り、第7回以降で再検討
      - (d) 当日相談しながら決める

      AI推奨: (b) → (d)。「まず Google を増設して 1 週間試用」のフレームで提示すると判断材料が増える
