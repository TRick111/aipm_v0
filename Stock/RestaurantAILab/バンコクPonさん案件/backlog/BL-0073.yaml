      - (a) 個人 iPhone・制限なし → そのまま App Store からインストール
      - (b) 会社端末・MDM あり → IT に申請 or 個人 iPhone に切替 / 別 push 経路 (LINE Notify 等) 検討
      - (c) iPhone 以外を主に使う (Android) → ntfy は Android 版もあり問題なし

      AI推奨: (a)。当日にダメだった場合は メール下書き生成 に push を切替 (Mail.app に届く形に変える)
