    content: |-
      Q3. PONさんは Google アカウントを既に持っているか？ [方針確定 / 任意]

      Part 4 (Google Calendar 連携) のハンズオン速度に直結。Workspace か個人 Gmail かでメニュー位置が若干違う。

      選択肢:
      - (a) 個人 Gmail を保有 → そのまま Calendar API を有効化して進める
      - (b) Workspace 契約あり (会社ドメイン) → 管理者が API 有効化を許可しているか確認が必要
      - (c) Google アカウント未保有 → 当日 5 分で個人 Gmail を作るか、Part 4 は次回送り
      - (d) 不明 → 当日確認。代替プランとして「読み込みのみデモ → PONさん環境で持ち帰り設定」を準備

      AI推奨: (d)。当日 (a) なら本番設定、(b)/(c) ならデモ機 (田中側) で見せる形に切替
  - id: q-BL-0073-4-20260427-icloud
