    content: |-
      Q1. PON さんの Power Platform バックエンドは Dataverse か SharePoint か（あるいは両方）？ [方針確定 / 任意]

      接続手段（A2: Dataverse MCP / B: M365 MCP / 併用）の最終確定に必要。回答が無くても v2 は両ケース対応で書いてあるが、月曜セッションで IT に確認すれば 1 本に絞れる。

      選択肢:
      - (a) Dataverse のみ → 推奨: 公式 Dataverse MCP Server + PAC CLI (`pac data query`)
      - (b) SharePoint Excel/CSV のみ → 推奨: Microsoft 365 MCP Server を `--read-only` で
      - (c) 両方 → 両 MCP を Cursor に登録 (同じサービスプリンシパルで OK)
      - (d) 不明 → 月曜セッションで IT に確認

      AI推奨: (d) (事前確認できればベターだが、v2 は (c) 想定で書かれているのでそのまま IT に提示できる)
  - id: q-BL-0074-2-20260427-auth
    at: '2026-04-27T09:30:00+09:00'
    cockpit_task_id: '0'
    content: |-
      Q2. 認証方式の希望（証明書認証 vs クライアントシークレット）？ [方針確定 / 任意]

      サービスプリンシパルの認証方式。v2 では証明書認証を推奨しているが、IT が慣れていない場合は短期シークレット (90 日ローテ) で開始してよい。

      選択肢:
      - (a) 証明書認証 (推奨): macOS Keychain / Windows 資格情報マネージャに保管・エクスポート不可。1 年更新。
      - (b) クライアントシークレット: 1Password Business 等に保管。90 日ローテ必須。
      - (c) IT に判断を委ねる (月曜に決定)

      AI推奨: (c) (IT の Entra ID 運用経験次第で最適解が変わる。v2 は両対応で記述)
  - id: q-BL-0074-3-20260427-cursor
    at: '2026-04-27T09:30:00+09:00'
    cockpit_task_id: '0'
    content: |-
      Q3. PON さんは Cursor を既に使っているか / Privacy Mode 設定の有無？ [任意]

      v2 は Cursor Privacy Mode 必須前提で書いている。利用ステータスにより月曜の説明深度が変わる (未利用なら Cursor の概念紹介から)。

      選択肢:
      - (a) 使っている + Privacy Mode 有効 → そのまま接続設定だけ詰める
      - (b) 使っている + Privacy Mode 未確認 → 設定確認を先に挟む
      - (c) 未利用 → Cursor 概要 + Privacy Mode 設定 + MCP 設定 を月曜の冒頭でまとめる

      AI推奨: (b) または (c) を想定して資料に Cursor 説明スライドを 1 枚足すか、町田さんから事前確認
  - id: q-BL-0074-4-20260603012923
    at: '2026-06-03T01:29:23.069Z'
