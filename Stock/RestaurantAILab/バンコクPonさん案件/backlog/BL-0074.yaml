      Q4 (2026-06-03 田中さん確認): v3 IT 送付準備パック (d-20260603-001) を承認し送付経路を確定したい。次のどれを採用しますか?

      選択肢:
      - (A) PON さん経由で IT へ転送 (LINE で PON さん宛 → IT へ転送依頼)。第一推奨。摩擦少。
      - (B) 町田さん経由で IT へ (現地語・技術補足込み)。第二推奨。町田さん稼働調整必要。
      - (C) 田中から IT 担当へ直送 (関係性弱め)。最終手段。
      - (D) 第7回セッション枠で対面渡し。既に 1 ヶ月遅延中のため非推奨。
      - (E) その他経路を指定 (例: PON さん経由 + 田中 CC)。

      AI 推奨: (A) → 1 週間反応なければ (B) → (C) へエスカレーション。v3 §4.4 のスクリプトで自動化可。
  - id: q-BL-0074-5-20260603012931
    at: '2026-06-03T01:29:31.648Z'
    cockpit_task_id: 4deb4964
    content: >-
      Q5 (2026-06-03 田中さん確認): IT 既存 Q1-Q3 (Power Platform バックエンド / 認証方式 / Cursor 利用状況) は v3 §3 の以下デフォルトで仮固定して進めてよいですか?
      IT 回答が返ったら差分反映 (v4) で対応します。


      デフォルト案:

      - Q1 → (c) Dataverse + SharePoint 併用想定で両 MCP 準備

      - Q2 → (b) クライアントシークレット 90 日ローテで開始 (証明書希望なら後で切替)

      - Q3 → (c) PON さん Cursor 未利用前提でセットアップ手順を別添


      選択肢:

      - (Yes) デフォルトで進めて OK。IT 回答受領後に v4 で差分反映。

      - (No) IT 回答前は着手停止。回答待ち継続。

      - (修正案あり) 一部デフォルトを変更したい (例: Q2 は証明書認証で行きたい等) → 内容指定してください。
  - id: q-BL-0074-6-20260603012940
    at: '2026-06-03T01:29:40.788Z'
    cockpit_task_id: 4deb4964
    content: |-
      Q6 (2026-06-03 田中さん確認): IT 送付フォーマットの希望は? v2 本体 (28KB / 12 セクション) と v3 ラッパーをどう組み合わせますか?

      選択肢:
      - (A) v3 §1+§2 抜粋を 3-4 ページ PDF にし、v2 本体は別添参照。**IT が読みやすい。第一推奨**
      - (B) v3 全文 + v2 全文を 1 つの PDF に統合 (40 ページ超)。網羅性重視。
      - (C) v3 §1+§2 のみ (1 ページ + 質問票) を送付。v2 は要求があれば後送り。**最軽量・反応率重視**
      - (D) v3 本文をメール本文に直貼り (PDF なし)。スマホでも読める。
      - (E) その他フォーマット指定。

      AI 推奨: (A) (即答質問票で先に意思決定 → 必要時のみ詳細参照、という IT 担当者の読み方に合わせる)。準備工数: PDF 化 30 分程度。
