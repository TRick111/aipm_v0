description: >-
  Playwright 実行基盤を scripts/marketing/fetch/ 配下に整備（M-14a）。
  媒体ごとのスクリプト（{channel}.ts）を段階的に実装し、月次バッチ（cron or Vercel Cron）で
  媒体ログイン → レポートダウンロード → /api/marketing/upload への自動送信を実現。
  媒体ログイン情報は MarketingCredentials の暗号化テーブルから取得（M-14b、BL-0102 と連動）。
  2要素認証への人手介入フォールバック（M-14c）と媒体規約レビュー（M-14d）を併走。
  ★ 媒体規約レビューは RestaurantAILab 内で実施（田中／吉田／町田、2026-06-25 PO 確定）。法務外注は当面しない。
  推奨スケジュール（B案）: Phase 1.0 リリース後の 7/04〜7/22 に基盤実装 + 1〜2 媒体先行、
  Phase 1.1 リリース（7月下旬）で対応媒体を段階追加。
  要件定義書 §5.5（M-14）、§11 リスク R-1〜R-4 に対応。
