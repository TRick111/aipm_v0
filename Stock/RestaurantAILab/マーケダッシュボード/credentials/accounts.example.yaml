# マーケダッシュボード生データ取得用 アカウント情報テンプレート
#
# ⚠⚠⚠ 重要 ⚠⚠⚠
# このファイル (accounts.example.yaml) は **gitignore で除外されていません** =
# 内容がそのまま git に commit / push されます。
# **このファイルに実際の ID / PW を書かないでください**。
#
# 実値は必ず accounts.yaml に書いてください（gitignore で除外済）。
#
# 使い方:
#   1. このファイルをコピー → `accounts.yaml` にリネーム
#         cp accounts.example.yaml accounts.yaml
#   2. accounts.yaml の各フィールドを実値で埋める
#   3. accounts.example.yaml は触らない（このプレースホルダー状態のまま push する）
#
# 取得手順 SOP は ../docs/取得SOP/ 配下を参照

stores:
  - store_code: pockunpa-okazaki
    store_name: 韓国屋台ポックンパ ネネチキン 東岡崎店

    accounts:
      # ───── 食べログ店舗会員 ─────
      # 用途: 食べログ本体（PV / 予約 / 順位 / クチコミ）。
      # スキル: tabelog-marketing-scrape（既存）
      # SOP:  ../docs/取得SOP/README.md（食べログ本体は手動 SOP なし。スキル経由）
      tabelog_owner:
        url: "https://owner.tabelog.com/owner_account/login/"
        login_id: "<YOUR_TABELOG_LOGIN_ID>"
        password: "<YOUR_TABELOG_PASSWORD>"
        two_factor: "none"      # none / sms / email / authenticator
        notes: ""

      # ───── 食べログノート ─────
      # 用途: 予約一覧 / 予約コース / 分析-総客数
      # SOP:  ../docs/取得SOP/tabelog_note_*.md
      # 備考: 食べログ owner と同一ログインの場合は same_as: tabelog_owner で OK
      tabelog_note:
        url: "https://owner.tabelog.com/owner_account/login/"  # 入口は食べログ owner と同じ。ログイン後 /tn/ 系へ遷移
        same_as: ""             # tabelog_owner と同じならここに "tabelog_owner" 記入
        login_id: ""
        password: ""
        two_factor: "none"
        # 台帳連携状況（ebica / Resty / RESZAIKO / レスラク のいずれかを経由すると分析機能が無効）
        ledger_integration: ""  # 例: "なし" / "ebica" / "Resty" など
        notes: ""

      # ───── ホットペッパーグルメ（リクルート ID） ─────
      # 用途: 流入ワード / クチコミ
      # SOP:  ../docs/取得SOP/hpg_流入ワード_SOP.md, hpg_クチコミ_SOP.md
      hpg_recruit:
        url: "https://www.cms.hotpepper.jp/CLN/login/"
        login_id: "<YOUR_HPG_RECRUIT_ID>"
        password: "<YOUR_HPG_PASSWORD>"
        two_factor: "none"      # 2FA がある場合は sms / email / authenticator
        notes: ""

      # ───── レストランボード ─────
      # 用途: 予約一覧（HPG ネット予約 + 電話予約の生データ）
      # SOP:  ../docs/取得SOP/hpg_restaurant_board_予約一覧_SOP.md
      # 備考: HPG リクルート ID と同一なら same_as: hpg_recruit で OK
      restaurant_board:
        url: "https://restaurant-board.com/"
        same_as: ""             # hpg_recruit と同じならここに "hpg_recruit"
        login_id: "<YOUR_RB_LOGIN_ID>"
        password: "<YOUR_RB_PASSWORD>"
        two_factor: "none"
        notes: ""

# ─────────────────────────────────────────────
# 取得対象期間（過去 12 ヶ月）
# 取得実行時に各スクレイパ／SOP に渡す月リスト。
# 当月（実行月）の前月から 12 ヶ月遡る。
# ─────────────────────────────────────────────
target_period:
  # YYYY-MM-DD（取得実行日）。空欄なら実行時の本日扱い
  reference_date: ""
  # 過去何ヶ月分取るか
  months: 12
