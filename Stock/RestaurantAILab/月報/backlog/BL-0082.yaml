    by: ai
    content: >-
      【BFA月報・名寄せagent】2件の重大な前提崩れにより一旦ブロック中。質問2件を pending_questions に登録済（レシピシート所在 / 2026-04 POS出数の所在）。


      調査結果サマリ：

      1. **レシピシート(商品一覧)** — 指定スプレッドシート `1yALYHSMncsSURPfWEN0SXQJeVUdMm6yxUXhhkal-q3o` (【BFA】本部サポート)
      に「商品一覧」シートは存在せず、99品目構成のメニューマスタも見当たらない。Drive全体検索で「レシピ」「レシピ_riku」も確認したがいずれも該当シートなし。


      2. **2026-04 POS出数** — Dashboard DB (Neon) の `sales_data`/`sales_items`/`pl_daily_sales` 全テーブルでBFA
      4月分は0件。さらに全店舗を見ても2026-04データはゼロ（最終: 2026-02）。BFAの実データは store_code=`test-003` (store_name='BAR FIVE Arrows')
      配下に2026-02のみ存在(123 sales / 681 items / 134 menus)。Drive上のBFA売上フォルダ `1B9lqNROnX9gVfefmVjLhlm0wRIJdsgWf`
      にも2026年のCSVは存在せず（最新2025年分まで）。


      判断材料が揃い次第、以下の流れで再開します:

      (a) レシピシート確定 → `商品一覧` に相当するシートからメニューマスタ取得

      (b) POS出数確定（4月CSVをインポートする/対象月を変える/test-003から取る等）→ menuName で集計

      (c) exact → normalized → fuzzy(0.85+) のマッチング、unmatched_pos / unmatched_recipe を分離して記録

      (d) `mapping/pos_recipe_mapping.yaml` および `mapping/README.md` を生成、deliverable登録 → 完了報告


      現在 `Flow/202605/2026-05-04/RestaurantAILab/月報/mapping/` は空のまま（早合点で空ファイルを置かない方針）。
