      |---|---|---|

      | bbc-001 | 2026-02 | 58 |

      | shiki-001 | 2026-02 | 195 |

      | **test-003 (= BAR FIVE Arrows)** | **2026-02** | **123 (sales_data) / 681 (sales_items) / 134 (menu_master)** |

      | bfa-001 | — | **0件 (sales_data/menu_master/pl_daily_sales 全て空)** |


      判明したこと：

      - BFA-001 のデータは実は `test-003` store_code 配下にある（`store_name='BAR FIVE Arrows'`）。  
        Dashboard リポジトリには `scripts/migrate-test003-to-bfa001.ts` というスクリプトがあり、移行予定だった様子。
      - それでも 2026-04 のデータは test-003 にも存在しない（最終: 2026-02）。

      - csv_import_logs の最新 BFA インポートも `2026-02-23` の `会計明細_20260201-20260228.csv` のみ。


      確認したいこと：

      (1) **2026年4月のBFA POS出数CSV**は既に手元（Drive/ローカル）にあって、Dashboard へのインポートが未実施という状態でしょうか？  

      　→ もしそうなら、CSVの所在を教えていただくか、私が `scripts/bulk-upload-airregi.mjs` 等でインポートすればよいか、あるいは別エージェントに依頼するか指示ください。

      (2) DBに入っている店舗コードは `test-003` ですが、月報生成時は `bfa-001` として表記すれば良いですか？（store_name は既に「BAR FIVE Arrows」になっています）

      (3) もし4月CSVがまだ存在せず、2月分しか取れない状況なら、月報の対象月を変更する必要があるかもしれません。


      並行して、レシピシート所在確認(先の質問)が解決し次第、現存する2月分のPOSデータでマッピング雛形を作っておく事も可能です。指示お願いします。
