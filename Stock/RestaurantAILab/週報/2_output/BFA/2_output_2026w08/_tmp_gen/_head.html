<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAR FIVE Arrows 週次営業報告 — 2026-W08</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#E2E8F0;font-family:'Helvetica Neue','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:20px;color:#334155;}
.slide{width:1280px;height:720px;position:relative;overflow:hidden;background:#fff;font-family:inherit;}
@media screen{.slide{margin:0 auto 40px auto;box-shadow:0 4px 20px rgba(0,0,0,.12);}}
@media print{body{margin:0;padding:0;background:#fff;}.slide{page-break-after:always;page-break-inside:avoid;break-after:page;break-inside:avoid;box-shadow:none;margin:0;}.slide:last-child{page-break-after:auto;}}
.slide-header{background:#1E3A5F;color:#fff;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;position:relative;}
.slide-header h2{font-size:32px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85%;}
.slide-header .pn{font-size:16px;opacity:.7;flex-shrink:0;}
.progress-bar{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.4);border-radius:0 2px 2px 0;}
.slide-header .section-tag{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:4px;font-size:14px;font-weight:500;}
.msg-bar{background:#FFF7ED;border-left:5px solid #F97316;padding:12px 40px;font-size:28px;font-weight:800;color:#1E293B;line-height:1.4;}
.slide-body{padding:18px 40px 14px 40px;overflow:hidden;}
.slide-title{background:linear-gradient(135deg,#1E3A5F 0%,#0F172A 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center;}
.main-title{font-size:46px;font-weight:800;line-height:1.3;}
.sub-title{font-size:26px;font-weight:400;margin-top:12px;opacity:.9;}
.period{font-size:18px;margin-top:20px;opacity:.7;}
.note{font-size:17px;margin-top:18px;opacity:.6;max-width:800px;}
.kpi-row{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;justify-content:center;}
.kpi-card{flex:1;min-width:200px;max-width:280px;background:#F8FAFC;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;}
.kpi-label{display:block;font-size:17px;font-weight:600;color:#64748B;}
.kpi-value{display:block;font-size:40px;font-weight:800;color:#1E293B;margin:4px 0;}
.kpi-change{display:block;font-size:20px;font-weight:700;}
.kpi-change-sub{display:block;font-size:17px;color:#64748B;margin-top:2px;}
.positive{color:#22C55E;} .negative{color:#EF4444;}
.dt{width:100%;border-collapse:collapse;font-size:18px;}
.dt th{background:#1E3A5F;color:#fff;padding:10px 14px;text-align:left;font-size:17px;font-weight:700;}
.dt td{padding:9px 14px;border-bottom:1px solid #E2E8F0;}
.dt tr:nth-child(even){background:#F8FAFC;}
.dt .highlight-row{background:#FFF7ED;border-left:4px solid #F97316;}
.dt .highlight-row td{font-weight:800;color:#C2410C;}
.dt td.num{text-align:right;}
.action-table{width:100%;border-collapse:collapse;font-size:15px;}
.action-table th{background:#1E3A5F;color:#fff;padding:8px 10px;font-size:15px;font-weight:700;text-align:left;}
.action-table td{padding:7px 10px;border-bottom:1px solid #E2E8F0;vertical-align:top;}
.action-table tr:nth-child(even){background:#F8FAFC;}
.action-table .highlight-row{background:#FFF7ED;border-left:4px solid #F97316;}
.action-table .highlight-row td{font-weight:700;color:#C2410C;}
.bullet-list{list-style:none;padding:0;}
.bullet-list li{display:flex;align-items:flex-start;gap:12px;background:#F8FAFC;border-radius:10px;padding:12px 18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);font-size:17px;line-height:1.5;}
.bullet-list .icon{font-size:26px;flex-shrink:0;margin-top:2px;}
.bullet-list .text{flex:1;}
.bullet-list .text strong{color:#1E293B;}
.card-row{display:flex;gap:16px;flex-wrap:wrap;}
.info-card{flex:1;min-width:220px;background:#F8FAFC;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.info-card h4{font-size:20px;font-weight:700;margin-bottom:6px;}
.info-card p,.info-card li{font-size:17px;line-height:1.5;}
.success-item{background:#F0FDF4;border-radius:10px;padding:12px 18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.success-item h4{font-size:19px;font-weight:700;color:#22C55E;margin-bottom:4px;}
.success-item p{font-size:17px;line-height:1.5;}
.challenge-item{background:#FEF2F2;border-radius:10px;padding:12px 18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.challenge-item h4{font-size:19px;font-weight:700;color:#EF4444;margin-bottom:4px;}
.challenge-item p{font-size:17px;line-height:1.5;}
.chart-comment{display:flex;gap:20px;}
.chart-area{flex:2;}
.comment-area{flex:1;font-size:17px;line-height:1.6;}
.comment-area h4{font-size:20px;font-weight:700;margin-bottom:8px;color:#1E293B;}
.comment-area li{margin-bottom:6px;}
blockquote{border-left:3px solid #3B82F6;padding:10px 18px;margin:10px 0;background:#F8FAFC;border-radius:0 10px 10px 0;font-size:17px;line-height:1.5;}
blockquote strong{color:#1E293B;}
.two-col{display:flex;gap:24px;}
.two-col>div{flex:1;}
h3.sec{font-size:22px;font-weight:800;color:#1E293B;margin:10px 0 8px 0;}
.small-note{font-size:16px;color:#64748B;margin-top:6px;}
.gauge-card{background:#F8FAFC;border-radius:12px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;}
.gauge-card .gauge-value{font-size:48px;font-weight:900;}
.gauge-card .gauge-label{font-size:17px;font-weight:600;color:#64748B;}
.metric-row{display:flex;gap:14px;margin:8px 0;flex-wrap:wrap;}
.metric-card{flex:1;min-width:140px;background:#F8FAFC;border-radius:12px;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;}
.metric-card .mc-label{font-size:17px;font-weight:600;color:#64748B;}
.metric-card .mc-value{font-size:34px;font-weight:800;color:#1E293B;}
.metric-card .mc-sub{font-size:17px;font-weight:600;}
</style>
</head>
