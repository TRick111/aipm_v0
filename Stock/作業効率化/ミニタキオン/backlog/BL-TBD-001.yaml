description: |
  ## 背景

  ミニタキオン (AIPM の INBOX/daily_tasks を廃止しモバイル一画面に統合する webapp) の最初の動くマイルストーン。Tachyon Workspace のミニ版で、田中さんがスマホから AI 成果物のレビュー・次指示を1画面で完結させるためのツール。

  Phase 1 は **view-only**: 書き込み機能なし、Stock/Flow を読んで表示するだけ。書き込みは Phase 2 へ。

  ## タスク詳細

  1. Bun + Next.js (App Router, TypeScript, Tailwind) スケルトン作成
  2. shadcn/ui 初期化 + 必要コンポーネント追加
  3. lib/types.ts: Project / BL / Deliverable / Status の zod スキーマ (schema_version: 1)
  4. lib/stock.ts / lib/flow.ts: スキャナ実装 (Server-side)
  5. lib/index-store.ts: module-level singleton + BL駆動 load
  6. lib/watcher.ts: chokidar + 5min fallback
  7. instrumentation.ts: 起動時に index warm + watcher 起動
  8. 4 画面実装 (ホーム / プロジェクト / BL / 成果物)
  9. launchd plist + install.sh
  10. Tailscale 越し動作確認

  ## 完了条件

  - [x] iPhone Safari から `http://rikus-mac-mini-3.tailad7d87.ts.net:3000/` で開ける
  - [x] 4 画面が view-only で動く
  - [x] BL駆動 load + chokidar + module singleton (Eng Review 1A/4A 反映)
  - [x] schema_version: 1 を全 zod スキーマに (Eng Review 2A 反映)
  - [x] prod build 成功
  - [x] launchd plist 準備済 (install.sh ヘルパー付き)

