description: |
  ## 背景

  Phase 1 の view-only MVP が動いたが、田中さん iPhone 実機確認の結果「デザインが全く良くない」とフィードバック。
  shadcn/ui のデフォルトをそのまま使っただけでは個人の毎日使うツールとしての魅力が無い。Linear / Notion / iOS native 級の見栄えと使いやすさが必要。

  併せて以下も実装:
  - 各 BL アイテムに「背景 / タスク詳細 / 完了条件」の3 section 表示
  - AI フィードバック欄 (textarea + Send、Phase 2 までは visual only)
  - 例データ (4プロジェクト、複数BL) で実際にダッシュボードが「生きている」状態
  - **(v3 反映)** トップページをプロジェクト別折りたたみに変更
  - **(v3 反映)** STATUS.md の markdown レンダリング
  - **(v3 反映)** 色を状態色のみに削減
  - **(v3 反映)** glassmorphism 廃止
  - **(v3 反映)** BL データモデルを schema v2 化 (thread → cockpit_task_ids + pending_questions + decisions)

  バックログ構造は変えず (schema は v2 で再設計しスリム化)、フロントエンドのみ改善。

  ## タスク詳細

  1. デザインシステム (CSS variables、ダーク default、状態色のみ、生地感は控えめ)
  2. ホーム画面: プロジェクト別折りたたみ、各プロジェクトに件数メタ、内部は状態順ソート
  3. プロジェクト詳細: STATUS.md frontmatter ヘッダ + 本文 markdown レンダリング (テーブル含む)
  4. BL 詳細: 3 section カード + pending_questions リスト + decisions タイムライン + 「全会話を見る」ボタン (cockpit task get モーダル)
  5. AI フィードバック UI (visual only、localStorage 下書き)
  6. 成果物詳細: markdown レンダリング + コメント送信 UI

  ## 完了条件

  - [x] v1 デザインシステム + 4 画面 + AI フィードバック (2026-04-25 20:40)
  - [ ] v2 修正 (プロジェクト別折りたたみ / STATUS markdown / 色削減 / glassmorphism 廃止) ← 進行中
  - [ ] v3 schema v2 対応 (lib/types.ts / pending_questions UI / decisions UI / cockpit task get モーダル)
  - [ ] 田中さん iPhone 実機確認で「これなら毎日使える」OK

