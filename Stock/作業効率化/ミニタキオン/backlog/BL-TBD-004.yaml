description: >
  ## 背景


  ミニタキオンを「1日の運用ハブ」に進化させる Phase 3 の最初のマイルストーン。**☀️ 今日を始める** ボタンと、それを押した時に走る朝のタスク整理エージェントを実装する。


  Phase 3 全体は a/b/c/d の 4 段に分かれており、本 BL は **3a (朝の整理) のみ** を扱う。3b/3c/3d は別 BL (BL-TBD-005/006/007) に切り出し済。


  ## タスク詳細


  1. ホーム画面に「☀️ 今日を始める」ボタン (8:30 過ぎ警告バッジ付き)

  2. 「📅 今日の運用」セクションをホーム最上部に追加

  3. Server Action `startDailyLoop()` (idempotent、cockpit task 起動)

  4. 固定プロンプト `lib/prompts/daily-start.md`:
     - データソース: `Stock/定型作業/バックログ/Backlog.md` 中央台帳 (canonical)
     - mini-tachyon per-project BL は補助
     - 出力形式: `Flow/202604/2026-04-24/0424_planning.md` 4/24 planning スタイル
     - 案件 (Project) ごとのグルーピング + 状況サマリー + 期日順テーブル
     - クラス ABC (🟢A AIで即実行可 / 🟡B 要件詰めればA化 / 🔴C 本人実行 / ⏸️保留)
     - AI 回答ルール + schema 厳守ルール (再発防止)

  5. vitest テスト追加


  ## 完了条件


  - [x] v1 実装完了 (UI ボタン / セクション / Server Action / vitest 47 pass)

  - [x] v2 プロンプト書き直し (4/24 形式 + 中央 Backlog.md ベース)

  - [ ] **4/26 朝の実機テスト**: 田中さんが iPhone で ☀️ 押下 → AI が中央 Backlog から全 Project の active BL を抽出 → 4/24 形式で `今日のタスク案.md` を生成 → ミニタキオン UI で表示・レビュー可能

  - [ ] 実機運用で違和感なし (案件別グルーピング、クラス ABC、期日表示が正しい)
