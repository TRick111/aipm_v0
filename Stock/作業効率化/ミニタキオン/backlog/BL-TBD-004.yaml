  - at: '2026-04-25T14:05:00+09:00'
    type: commitment
    by: ai
    content: |
      質問への回答 (cockpit task 717658ce で答えた内容を BL に転記、UI 可視化のため):

      バックログはプロジェクトごとに分散しています。実態は:
      `Stock/<カテゴリ>/<プロジェクト>/backlog/BL-XXX.yaml`
      = 1 プロジェクト = 1 backlog/ ディレクトリ、BL ごとに 1 yaml ファイル。

      現在 backlog/ を持つのは 5 プロジェクト:
      - 作業効率化/ミニタキオン/backlog/ (BL-TBD-001〜004)
      - RestaurantAILab/麻布しき/backlog/ (BL-MAS-001, 002)
      - RestaurantAILab/HACCPアプリ開発/3_planning/backlog/
      - 本業/バー5アローズ/backlog/
      - 生活管理/健康管理/backlog/

      これは ミニタキオン v2 設計時 (前セッション Q4-B 確定) に「Stock 直接編集 + プロジェクト別」で決めた構造。
      AIPM に「Backlog 1 ファイル」は存在しない。「Stock/定型作業/バックログ/」フォルダは別物 (定型タスクの台帳、BL とは無関係)。
