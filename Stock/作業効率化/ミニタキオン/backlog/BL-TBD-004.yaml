description: >
  ## 背景


  Phase 1 (view-only) と Phase 2 (書き込み機能) で「AI 成果物のレビュー → 次指示」の core loop は完成。次は **1日の運用そのもの (朝のタスク整理 + 夜の振り返り)
  をミニタキオンに統合** する。


  田中さんは毎朝、複数プロジェクトを横断して「今日何をやるか」を整理しているが、現状は属人化 (頭の中 + AIPM ファイル確認)。これを ミニタキオン上の固定フロー (☀️ 今日を始める / 🌙 今日を締める ボタン)
  に置き換え、AI が整理案を出して田中さんが承認する形に。


  これで AIPM 散文 3 ファイル (STATUS / INBOX / daily_tasks) のうち最後の `daily_tasks.md` も廃止できる (今日のタスク案.md が引き継ぐ)。


  ## タスク詳細


  詳細は成果物 `daily_loop_design.md` (改訂版) を参照。要点:


  1. ホーム画面に「☀️ 今日を始める / 🌙 今日を締める」ボタン追加 (時間帯で強調切替、8:30 までの ☀️ 押し忘れ警告バッジ)

  2. Server Actions: `startDailyLoop()` / `endDailyLoop()`

  3. 固定プロンプト 2 種: `lib/prompts/daily-start.md` `daily-wrapup.md`

  4. 朝/夜の整理結果は `Flow/<date>/_orchestration/` に deliverable として保存 (専用 BL は作らない)

  5. 朝のエージェントは backlog/ に active BL を持つプロジェクトのみを対象に走査

  6. 既存 03:00 cron に未締め自動実行を統合

  7. 「📅 今日の運用」専用 UI セクション + 「📚 過去の運用」リンク (Flow フォルダ日付降順)

  8. 承認後 AI が各 BL の priority/state を自動更新

  9. テスト


  実装は Phase 3a / 3b / 3c / 3d に分割、合計 3-4 日。


  ## 完了条件


  - [x] 田中さんが改訂版設計書 `daily_loop_design.md` を再レビュー、承認 (2026-04-25 done)

  - [ ] 設計確定後、Phase 3a (☀️ + 朝の整理 + `_orchestration` deliverable 作成) 実装

  - [ ] Phase 3b (🌙 + 夜の振り返り + Stock マージ) 実装

  - [ ] Phase 3c (03:00 cron 統合 + 承認後自動更新) 実装

  - [ ] Phase 3d (UI セクション + 過去の運用リンク) 実装

  - [ ] iPhone 実機で実際に「☀️ 今日を始める」を押して 1 日が回る動作確認

  - [ ] 1 週間運用してフローに違和感がないか検証
