  - at: '2026-04-25T23:00:00+09:00'
    type: answer
    by: user
    content: |
      Daily Loop 設計 v1 を ミニタキオン UI で needs_revision レビュー、9 項目を確定:

      D1: 朝/夜 deliverable は Stock に専用プロジェクトを作らず、Flow/<date>/_orchestration/ に保存
      D2: 1日に作る成果物は朝 + 夜 で 2 件 (deliverable として)
      D3: タスク案の粒度は BL 優先順位 + 各 BL「今日 AI が進める」内容 1-2 行 (推奨案)
      D4: 田中さんが done で承認したら AI が各 BL の priority/state を自動更新する
      D5: アーカイブ処理はなし。Flow フォルダ構造にどんどん蓄積し、「📚 過去の運用」リンクから日付降順で参照
      D6: ☀️ を押す目標時刻は 8:30 まで。それ以降はホームに警告バッジ表示 (自動実行はしない)
      D7: スキップ機能は作らない。スキップしたい日も ☀️ を押し、エージェントに「今日はスキップ」と伝える
      D8: 朝のエージェントは backlog/ に active BL を持つプロジェクトのみを走査対象とする (全 Stock 走査ではない)
      D9: 前日履歴は前日 → なければ前々日 → 最大 7 日遡って直近の振り返りを 1 件読む
