description: >
  ## 背景


  Daily Loop の夜半分。Phase 3a (☀️ 朝の整理) が確定したら着手する。


  田中さんが「🌙 今日を締める」を押すと、その日の deliverables / decisions / 残課題を集約した「今日の振り返り.md」を AI が生成、`Flow/<today>/_orchestration/`
  に保存。STATUS.md を Flow → Stock にマージする (Phase 5 設計と統合)。


  ## タスク詳細


  1. ホーム画面に「🌙 今日を締める」ボタン (時間帯で目立たせる、夜は ☀️ より目立つ)

  2. Server Action `endDailyLoop()`:
     - Cockpit task 起動 (固定プロンプト daily-wrapup.md)
     - `Flow/<today>/_orchestration/今日の振り返り.md` の placeholder を deliverable として upsert
     - revalidatePath
  3. 固定プロンプト `lib/prompts/daily-wrapup.md`:
     - 当日の Flow 各プロジェクト deliverables.yaml から「今日 done になったもの」抽出
     - 各 BL の decisions[] から「今日 created_at の decisions」抽出
     - 残課題 (state=awaiting_user/blocked, pending_questions[] 非空) 集計
     - Markdown 出力 (Phase 3a と同じく 4/24 風だが「振り返り」用構造):
       - ## ✅ 今日完了したこと
       - ## 🚧 残課題
       - ## 📌 翌日への申し送り
       - ## 📊 メトリクス (任意)
     - 出力先: `Flow/<today>/_orchestration/今日の振り返り.md`
     - AI 回答ルール / schema 厳守ルール (Phase 3a と同じく末尾に組み込み)
  4. STATUS.md を Flow → Stock にマージするロジック (Phase 5 設計の lib/merge.ts を参考)

  5. vitest テスト追加


  ## 完了条件


  - [ ] 「🌙 今日を締める」ボタン UI

  - [ ] Server Action `endDailyLoop()` 実装

  - [ ] 固定プロンプト `daily-wrapup.md` 作成

  - [ ] AI が 4/24 風の「今日の振り返り.md」を生成

  - [ ] STATUS.md の Flow → Stock マージが動く

  - [ ] vitest テスト pass

  - [ ] iPhone で「🌙 今日を締める」を実際に押して 1 日を締めるテスト
