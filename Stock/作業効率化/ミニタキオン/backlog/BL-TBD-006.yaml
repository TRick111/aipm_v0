     - 当日 Flow の `今日の振り返り.md` が無ければ自動生成
  2. 朝のタスク案承認時の自動更新ロジック:
     - 田中さんが「今日のタスク案」deliverable を done で承認した時
     - app/actions.ts の updateReviewState() で trigger
     - AI に「承認内容を読み、各 BL の priority/state を更新してください」と指示するエージェント起動
  3. vitest テスト追加 (cron 入口 / 自動更新 ロジック の各分岐)

  ## 完了条件

  - [ ] 03:00 cron スクリプト/instruction が「未締め自動 endDailyLoop」をカバー
  - [ ] 朝のタスク案 done 承認 → AI が各 BL を自動更新するパイプライン
  - [ ] 自動更新後の BL.yaml が schema 厳守 (decisions[] に append、type/by/content 正しい)
  - [ ] vitest テスト pass
  - [ ] 1 週間運用してマージ漏れなし、自動更新で BL.yaml 破損なし

