  ## 背景

  Daily Loop のセーフティネット + 自動化。Phase 3b 完了後に着手。

  - 田中さんが 🌙 を押し忘れた日 (旅行・体調不良など) でも、深夜 03:00 cron で自動的に Stock マージが走り、データが整合する
