description: |
  ## 背景

  現状 mini-tachyon UI のプロジェクト一覧は `Stock/<cat>/<proj>/backlog/*.yaml` だけ読んでいて、中央 `Stock/定型作業/バックログ/Backlog.md` の ~44 active BL は invisible。朝のタスク案 deliverable には登場するが、ホームに表示されないため「ミニタキオンしか見えない」状態になる。

  本 BL で中央 Backlog.md を mini-tachyon UI のもう一つの BL データソースとして統合する。BL-TBD-006 (Phase 3c) が承認後の自動展開を実装する前に、まず可視化を達成する。

  ## タスク詳細

  1. **`lib/backlog-md.ts` 新規作成**: 中央 Backlog.md の `## Tasks` テーブルをパースして BL[] を返す
     - 各 row → BL オブジェクト ({id, title, status, priority, due, program, project, tags, notes})
     - status マッピング: todo → pending、doing → in_progress、blocked → blocked、done → completed
     - status_emoji 自動付与 (state_emoji と同じ表記)
     - source フィールドで「central」マーク (per-project YAML と区別)

  2. **`lib/index-store.ts` 拡張**: in-memory index に central Backlog.md の BL もマージ
     - 起動時に `lib/backlog-md.ts` を呼んで central BL を読み込み
     - per-project YAML BL と統合 (同 ID なら per-project 優先)
     - chokidar で Backlog.md も監視

  3. **UI 表示**: 既存の `components/bl-card.tsx` などで central BL も同じ見た目で表示
     - source: central の場合、現状は read-only として描画 (詳細ページで write-back を制限)
     - BL 詳細ページ (`/bl/[id]`) で central BL を開いた場合、AI フィードバック textarea は「Phase 3c で実装予定」 toast (現状の placeholder と同じ挙動)
     - 一覧の見た目は既存と同じ (status pill、priority、due など)

  4. **テスト**: vitest
     - `lib/__tests__/backlog-md.test.ts` で Backlog.md パース 5+ ケース (header検出 / 各 status / priority / due 空欄 / `|` エスケープ)
     - index-store.test.ts に central+per-project マージのテスト追加
     - 既存 68 テスト全 pass を維持

  ## 完了条件

  - [ ] `lib/backlog-md.ts` 実装完了 + テスト
  - [ ] `lib/index-store.ts` で central BL もマージ
  - [ ] mini-tachyon ホームで 中央 Backlog.md の active BL が project別グルーピングで表示
  - [ ] BL 詳細ページが central BL を開いて表示できる (read-only)
  - [ ] 既存 ミニタキオン own BL (BL-TBD-XXX) も従来通り表示維持
  - [ ] vitest 全 pass

  ## ファイルテリトリー (BL-TBD-005 と並列実行のため明確化)

  - **本 BL の owned files**: lib/backlog-md.ts (新規)、lib/index-store.ts (extension)、components/bl-card.tsx (read-only表示分岐 only)、lib/__tests__/backlog-md.test.ts (新規)、lib/__tests__/index-store.test.ts (extension)
  - **触らない**: app/actions.ts、lib/prompts/、lib/merge.ts、components/start-daily-loop-button.tsx、components/end-daily-loop-button.tsx (← Phase 3b territory)
  - **共有 (additive only)**: lib/types.ts (新規 type 追加 OK、既存 export 変更禁止)

