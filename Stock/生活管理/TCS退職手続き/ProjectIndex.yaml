      - TCS
      - タタコンサルタンシーサービシズ
      - 退職
      - 有給消化
      - フリーランス
      - 個人事業主
      - 概要
      - ネクストアクション

  - path: "tasks.md"
    summary: "退職に伴う公的・社内・私的手続きの全カテゴリ別チェックリスト（保険・年金・税金・雇用保険・企業型DC・職業変更 等）"
    keywords:
      - タスク一覧
      - チェックリスト
      - 健康保険
      - 任意継続
      - 国保
      - 国民年金
      - 厚生年金
      - 雇用保険
      - 離職票
      - 源泉徴収票
      - 住民税
      - 確定申告
      - 企業型DC
      - iDeCo
      - 小規模企業共済
      - 青色申告
      - インボイス
      - 退職挨拶
      - 期限

  - path: "log.md"
    summary: "プロジェクト内ファイルの作成/編集/削除履歴"
    keywords:
      - log
      - 履歴
