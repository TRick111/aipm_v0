version: 1

# ProjectIndex.yaml（AI専用）
# 目的:
# - ユーザー入力に対してAIが「このプロジェクト内のどのファイルを参照すべきか」を判断するためのプロジェクト内インデックス。

project: "TCS退職手続き"
root: "Stock/生活管理/TCS退職手続き"

canonical:
  readme: "README.md"
  log: "log.md"

files:
  - path: "README.md"
    summary: "プロジェクト概要・関係者・現在の状況・期限の山・重要リンク"
