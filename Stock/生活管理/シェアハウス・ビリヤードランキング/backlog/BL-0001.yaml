description: >-
  ## 背景

  シェアハウス共有スペースのビリヤード台で住民間にブーム到来。プレイヤー層は (a) コア=自分(10年/Bクラス/ファーゴ約470)、(b) 競技志向1名、(c) カジュアル層複数 の3層。きっかけは(b)を教え始めたこと。


  ## 目的

  1. ブームを長続きさせる (一過性にしない)

  2. 競技志向層に上達実感と目標を提供し熱量を保つ

  3. 真剣勝負を仕掛けやすい場を作り、カジュアル層に飲まれない仕組みを作る

  4. 非プレイヤー住民も巻き込みコミュニティの話題にする


  ## システム要件 (機能)

  1. 対戦記録&ランキング: 試合結果登録→ポイント変動→ランキング更新→個人レート可視化

  2. ハンデ機能: 実力差を埋めるハンデ条件 (フリーボール/ゲームボール拡張/狙える球制限など) と、ハンデ下試合のレート計算

  3. 絶対実力指標: 相対レートとは別に、コミュニティ全体のレベル上昇/個人の絶対的上達を映す指標

  4. LINEグループへの試合結果自動投稿 (非プレイヤー含めた盛り上げ)

  5. 'ランキング戦中'ステータスによる UX 装置: 真剣勝負を切り出しやすく、横入りを抑制


  ## 主要 Open Questions (詳細は pending_questions[] を参照)

  Q1 レーティング方式選定 / Q2 ハンデ反映方式 / Q3 絶対実力指標設計 / Q4 ゲーム種別 / Q5 登録UX&不正対策 / Q6 プラットフォーム / Q7 LINE通知経路 / Q8 初期レート&収束 / Q9
  inactivity扱い / Q10 真剣戦/カジュアル戦の線引き / Q11 想定人数スケール


  ## 次アクション候補

  - Open Questions の優先順位付け → 田中さん回答 → MVP スコープ確定

  - レーティング方式 (Q1) と 真剣戦/カジュアル戦の線引き (Q10) が他項目への影響大、先に決めたい
