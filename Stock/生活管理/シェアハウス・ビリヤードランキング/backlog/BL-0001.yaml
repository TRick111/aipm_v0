  - id: q-BL-0001-1-20260508034221
    at: '2026-05-08T03:42:21.036Z'
    cockpit_task_id: '0'
    content: >-
      Q1 レーティング方式の選定: Elo / Glicko-2 / FargoRate型 (試合のラック単位でカウント) / 独自のいずれを採用する? 対戦数が初期は少ないため、Glicko-2
      のように『不確実性』を持たせる方式が向いている可能性。判断軸が他項目 (Q2/Q3/Q8) に強く影響するため最優先で決めたい。
  - id: q-BL-0001-2-20260508034232
    at: '2026-05-08T03:42:32.686Z'
    cockpit_task_id: '0'
    content: >-
      Q2 ハンデの定量化と勝敗ポイントへの反映方法: 例) フリーボール / ゲームボール (8番もOK等) / 狙える球の制限 / 持ち点制 — どれをハンデのバリエーションとして採用するか?
      また、ハンデあり試合の結果をレート計算にどう反映するか (= ハンデを織り込んだ期待勝率を補正する方式 vs ハンデ込みの実質スコアで素直にElo計算)。
decisions:
  - at: '2026-05-09T06:20:51.270Z'
    type: answer
    by: user
    content: >-
      Q3 絶対実力指標: 試合経過の細かい記録は取らず、FargoRate を持っている特定ユーザー (= 自分、Fargo ≈ 470) の実力をアンカーとする方式を採用。他プレイヤーの推定 FargoRate = 470 +
      (相手 Glicko - 自分 Glicko) × 換算係数 (≈ 0.5) で算出。自分の Glicko は固定アンカー扱い、年1回程度の外部試合で実 FargoRate を測って換算式を再校正する。
  - at: '2026-05-09T06:20:51.515Z'
    type: answer
    by: user
    content: 'Q4 ゲーム種別: 種目別にレートを分けず、全種目統合して単一レートで運用する。'
  - at: '2026-05-09T06:20:51.634Z'
    type: answer
    by: user
    content: 'Q5 試合登録UX: Webアプリで実装。MVPはユーザーをDBに事前登録しておき、対戦者をドロップダウンで選んで結果入力。将来的にLINEログイン認証へ拡張する。'
  - at: '2026-05-09T06:20:51.792Z'
    type: answer
    by: user
    content: 'Q6 プラットフォーム: Webアプリで構築する。'
  - at: '2026-05-09T06:20:51.918Z'
    type: answer
    by: user
    content: 'Q7 LINE通知経路: LINE Messaging API (公式アカウント) を想定。シェアハウスのグループに公式アカウントを招待 → 試合結果を Push 通知で投稿。'
  - at: '2026-05-09T06:20:52.006Z'
    type: answer
    by: user
    content: 'Q8 初期レート: 管理者が各ユーザー登録時に恣意的に決定する (新規プレイヤーごとに見立てで初期値を入力)。Glicko-2 採用なら RD は標準値で開始、レートのみ管理者指定。'
  - at: '2026-05-09T06:20:52.082Z'
    type: answer
    by: user
    content: 'Q9 対戦頻度差/離脱者: inactivity decay は導入しない。代わりにシーズン制 (期間ごとにランキングをリセット or アーカイブ) を採用する。シーズンの長さは別途検討。'
  - at: '2026-05-09T06:20:52.189Z'
    type: answer
    by: user
    content: 'Q10 真剣戦/カジュアル戦の線引き: 真剣勝負として宣言/登録された試合のみ記録対象とする。カジュアル試合は記録しない。これは『ランキング戦中ステータス』の UX 装置とも整合する。'
  - at: '2026-05-09T06:20:52.319Z'
    type: answer
    by: user
    content: 'Q11 想定参加人数: 20人以内を MVP の上限スケールとする。'
