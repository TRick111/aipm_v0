  ## 背景

  田中さんは睡眠の質を長期トラッキングしたいが、現状スマートウォッチを持っていない。
  AIOS パイプラインに健康データを集約する一環として、Garmin と Apple Watch、Oura Ring を比較した結果、Apple は数日に1回の充電が要るためボツ、Oura はサブスク制で却下、Garmin の2機種 (Vivoactive 6, Venu 4) に絞り込み済み。最後の選定が今のブロッカー。

  ## タスク詳細

  1. Vivoactive 6 と Venu 4 のスペック比較 (重量、バッテリー、センサー、価格)
  2. AIOS パイプラインへのデータ連携可否確認 (特に体温センサーが Apple Health に同期されるか)
  3. 5年TCO 算出 (本体価格 + 周辺アクセサリ + 故障リスク)
  4. 田中さんの優先軸 (コスト > 連携 > 精度) で推奨選定
  5. 最終決定 → 購入手配

  ## 完了条件

