description: |
  ## 背景

  Garmin スマートウォッチ (BL-0028 で選定中) のデータを Apple Health 経由で AIOS パイプラインに流すための基盤を整える。Health Auto Export (HAE) アプリ ¥24.99 を経由して JSON 化、Vercel Webhook が受け、最終的に GitHub に commit して時系列追跡。

  ## タスク詳細

  1. Health Auto Export の設定 (どのメトリクスを export するか定義)
  2. Vercel に Webhook receiver を作る (Next.js Route Handler)
  3. データ保存先決定: GitHub commit (推奨) / Postgres / Notion DB
  4. 動作確認手順の整備 (ダミーデータ送信 → DB 反映確認)
  5. デバイス到着後の本番連携テスト

  ## 完了条件

  - [x] HAE エクスポート対象メトリクス定義 (steps, sleep, HR, workout)
  - [x] Vercel Webhook 雛形作成
  - [ ] DB 候補確定 (デバイス到着前にレビュー必要)
  - [ ] 動作確認 (ダミーデータでの E2E)
  - [ ] 本番デバイス連携 (BL-0028 完了後)

