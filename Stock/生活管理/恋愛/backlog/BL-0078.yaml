      Q2. 予約代行のスタンスを教えてください

      予約はアカウント名義 / SMS 認証 / 支払い情報の関係で **AI 単独完了は原則不可**。次のいずれかを希望してください。

      選択肢:
      - (a) オンライン予約: AI がフォームを下書きして URL を渡す → 田中さんが最終送信
      - (b) 電話予約: AI がスクリプトを最終確定 → 田中さんが指定時間帯に架電（推奨架電帯: 平日 15:00〜17:00 だが本業中。**18:00 直後 or 翌朝** が現実的）
      - (c) LINE 予約: AI が定型文を作成 → 田中さんが店公式アカウントへ送信
      - (d) 田中さん全部やる: AI は手順書のみで OK（既に Flow/202604/2026-04-27/生活管理/恋愛/hina_0501_reservation.md に作成済）

      📌 AI 推奨:
      - 店がオンライン予約対応 → (a) が最速・確実
      - 個人店で電話のみ → (b)。連休直前なので **本日中の架電** を推奨

      回答は (a)/(b)/(c)/(d) いずれかで OK。組み合わせも可（例: まず Web 確認、無ければ電話）。
